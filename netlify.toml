[build]
  command = "npm run build"
  publish = "_dist"

[dev]
  command = "npm run dev"
  targetPort = 8080

# Basic safety headers (minimal; adjust as needed)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
